<svg viewBox="0 0 640 230" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="winGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FF6FA5" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="620" height="210" rx="14" fill="url(#winGrad)" stroke="#FF6FA5" stroke-width="1.5" filter="url(#softShadow)"/>

  <rect x="10" y="10" width="620" height="34" rx="14" fill="#161b22"/>
  <rect x="10" y="30" width="620" height="14" fill="#161b22"/>
  <circle cx="32" cy="27" r="6" fill="#FF5F56"/>
  <circle cx="52" cy="27" r="6" fill="#FFBD2E"/>
  <circle cx="72" cy="27" r="6" fill="#27C93F"/>
  <text x="320" y="31" fill="#8b949e" font-size="12" text-anchor="middle">tatiana@devops: ~/infra</text>

  <text x="30" y="72" font-size="14">
    <tspan fill="#FF6FA5">$</tspan>
    <tspan fill="#e6edf3"> terraform apply</tspan>
  </text>

  <text x="30" y="98" font-size="13" fill="#7ee787">+ aws_instance.web will be created</text>
  <text x="30" y="118" font-size="13" fill="#7ee787">+ aws_s3_bucket.assets will be created</text>
  <text x="30" y="138" font-size="13" fill="#e3b341">~ aws_iam_role.ci will be updated in-place</text>

  <text x="30" y="164" font-size="13" fill="#8b949e">Plan: 2 to add, 1 to change, 0 to destroy.</text>

  <text x="30" y="192" font-size="14">
    <tspan fill="#7ee787">✓</tspan>
    <tspan fill="#e6edf3"> Apply complete! Resources: 2 added, 1 changed.</tspan>
  </text>

  <text x="30" y="212" font-size="14">
    <tspan fill="#FF6FA5">$</tspan>
    <tspan fill="#e6edf3"> </tspan>
    <rect x="46" y="200" width="9" height="15" fill="#FF6FA5">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </text>
</svg>
